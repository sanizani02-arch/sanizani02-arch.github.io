<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جەنگی مێشک</title>
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; --text-color: #f8fafc; --accent-color: #3b82f6; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background-color: var(--card-bg); border-radius: 16px; padding: 30px; width: 90%; max-width: 500px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h1 { color: var(--accent-color); margin-bottom: 10px; }
        .menu-btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: bold; background-color: var(--accent-color); color: white; transition: 0.3s; }
        .menu-btn:hover { background-color: #2563eb; }
        .info-text { margin-bottom: 20px; color: #94a3b8; }
    </style>
</head>
<body>

    <div class="container">
        <h1>جەنگی مێشک</h1>
        <p class="info-text">گرێکوێرەکانی لۆژیک و مێژوو</p>
        
        <button class="menu-btn" onclick="alert('دەستپێکردن')">دەستپێکردن: لۆژیک و مەتەڵ</button>
        <button class="menu-btn" onclick="alert('دەستپێکردن')">دەستپێکردن: مێژووی کوردستان</button>
    </div>

</body>
</html>
