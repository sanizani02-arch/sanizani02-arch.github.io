    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --correct-color: #10b981;
            --incorrect-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 20px;
            font-size: 2rem;
        }

        .menu-btn, .answer-btn, .next-btn {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.2s ease;
            background-color: var(--accent-color);
            color: white;
        }

        .menu-btn:hover, .next-btn:hover {
            background-color: var(--accent-hover);
        }

        .answer-btn {
            background-color: #334155;
            text-align: right;
        }

        .answer-btn:hover:not([disabled]) {
            background-color: #475569;
        }

        .correct { background-color: var(--correct-color) !important; }
        .incorrect { background-color: var(--incorrect-color) !important; }

        .hide { display: none; }
        
        #question-counter {
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        #question-text {
            font-size: 1.3rem;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .score-text {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">

            <button class="menu-btn" onclick="startQuiz('logic')">لۆژیک و مەتەڵ (١٠٠ پرسیار)</button>

            <button class="menu-btn" onclick="startQuiz('world')">مێژووی جیهان (بەم زووانە)</button>

        <!-- شاشەی پرسیارەکان -->
        <div id="quiz-screen" class="hide">

            <div id="answer-buttons"></div>

        <div id="result-screen" class="hide">

            <div class="score-text" id="score-display"></div>

        let currentCategory = '';
        let currentQuestionIndex = 0;
        let score = 0;

        function startQuiz(category) {
            if (category === 'world') {
                alert('ئەم بەشە بەم زووانە پڕ دەکرێتەوە!');
                return;
            }
            currentCategory = category;
            currentQuestionIndex = 0;
            score = 0;
            document.getElementById('menu-screen').classList.add('hide');
            document.getElementById('quiz-screen').classList.remove('hide');
            showQuestion();
        }

        function showQuestion() {
            resetState();
            const currentQuestion = quizData[currentCategory][currentQuestionIndex];
            document.getElementById('question-counter').innerText = `پرسیاری ${currentQuestionIndex + 1} لە ${quizData[currentCategory].length}`;
            document.getElementById('question-text').innerText = currentQuestion.question;

            [...currentQuestion.answers].sort(() => Math.random() - 0.5).forEach(answer => {

                const button = document.createElement('button');
                button.innerText = answer.text;
                button.classList.add('answer-btn');
                if (answer.correct) {
                    button.dataset.correct = answer.correct;
                }
                button.addEventListener('click', selectAnswer);
                document.getElementById('answer-buttons').appendChild(button);
            });
        }

        function resetState() {
            document.getElementById('next-btn').classList.add('hide');
            const answerButtons = document.getElementById('answer-buttons');
            while (answerButtons.firstChild) {
                answerButtons.removeChild(answerButtons.firstChild);
            }
        }

        function selectAnswer(e) {
            const selectedButton = e.target;
            const isCorrect = selectedButton.dataset.correct === "true";
            if (isCorrect) {
                selectedButton.classList.add('correct');
                score++;
            } else {
                selectedButton.classList.add('incorrect');
                // ڕەنگکردنی وەڵامە ڕاستەکە بە سەوز
                Array.from(document.getElementById('answer-buttons').children).forEach(button => {
                    if (button.dataset.correct === "true") {
                        button.classList.add('correct');
                    }
                });
            }

            Array.from(document.getElementById('answer-buttons').children).forEach(button => {
                button.disabled = true;
            });

            document.getElementById('next-btn').classList.remove('hide');
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData[currentCategory].length) {
                showQuestion();
            } else {
                showQuizResult();
            }
        }

        function showQuizResult() {
            document.getElementById('quiz-screen').classList.add('hide');
            document.getElementById('result-screen').classList.remove('hide');
            const totalQuestions = quizData[currentCategory].length;
            document.getElementById('score-display').innerText = `تۆ توانیت ${score} لە ${totalQuestions} وەڵام بە ڕاستی بدەیتەوە!`;
        }

        function showMenu() {
            document.getElementById('result-screen').classList.add('hide');
            document.getElementById('menu-screen').classList.remove('hide');
        }
