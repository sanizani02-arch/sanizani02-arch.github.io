<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کویزی لۆژیک و مێژوو</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --card-bg: rgba(34, 34, 34, 0.85);
            --accent-color: #ffcc00;
            --accent-hover: #e6b800;
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
            --btn-bg: #2a2a2a;
            --btn-hover: #3a3a3a;
            --correct-color: #2ecc71;
            --wrong-color: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            max-width: 550px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            transition: all 0.3s ease;
        }

        h1 {
            color: var(--accent-color);
            font-size: 28px;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        p {
            color: var(--text-muted);
            font-size: 17px;
            line-height: 1.6;
        }

        .btn-main {
            background-color: var(--accent-color);
            color: #0f2027;
            border: none;
            padding: 14px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 5px 15px rgba(255, 204, 0, 0.3);
            transition: all 0.3s ease;
        }

        .btn-main:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 204, 0, 0.4);
        }

        .score-board {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .score-board span {
            color: var(--accent-color);
            font-weight: bold;
        }

        #question-text {
            font-size: 20px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: var(--btn-bg);
            color: var(--text-main);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 16px 20px;
            text-align: right;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not([disabled]) {
            background-color: var(--btn-hover);
            border-color: var(--accent-color);
            transform: translateX(-5px);
        }

        .option-btn[disabled] {
            cursor: default;
        }

        .option-btn.correct {
            background-color: var(--correct-color) !important;
            border-color: var(--correct-color) !important;
            color: #fff;
        }

        .option-btn.wrong {
            background-color: var(--wrong-color) !important;
            border-color: var(--wrong-color) !important;
            color: #fff;
        }

        .hidden {
            display: none;
        }

        #next-btn {
            background-color: #ffffff;
            color: #0f2027;
            margin-top: 25px;
            width: 100%;
            border-radius: 12px;
            padding: 14px;
            font-size: 18px;
            box-shadow: 0 4px 10px rgba(255,255,255,0.1);
        }
        #next-btn:hover {
            background-color: #e6e6e6;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>یاخیبوون بە لۆژیک و مێژوو</h1>
    
    <!-- لاپەڕەی دەستپێکردن -->
    <div id="start-screen">
        <p>بەخێرهاتی بۆ کویزە مەزنەکەت! ئایا مێشکت ئامادەیە بۆ ڕووبەڕووبوونەوەی قورسترین پرسیارەکانی مێژوو و گرێکوێرەکانی لۆژیک؟</p>
        <button class="btn-main" onclick="startQuiz()">دەستپێکردن</button>
    </div>

    <!-- لاپەڕەی کویزەکە -->
    <div id="quiz-screen" class="hidden">
        <div class="score-board">
            <div>پرسیار: <span id="q-num">1</span>/100</div>
            <div>خاڵەکانت: <span id="score">0</span></div>
        </div>
        <h3 id="question-text">لێرەدا پرسیارەکە پیشان دەدرێت</h3>
        <div class="options-container" id="options"></div>
        <button id="next-btn" class="btn-main hidden" onclick="nextQuestion()">دوواتر</button>
    </div>

    <!-- لاپەڕەی کۆتایی -->
    <div id="end-screen" class="hidden">
        <h2>کۆتایی تاقیکردنەوەکە!</h2>
        <p>تۆ توانیت ئاستێکی باش نیشان بدەیت. کۆی خاڵەکانت:</p>
        <h1 style="font-size: 45px; margin: 15px 0;"><span id="final-score">0</span> <span style="font-size: 20px; color: var(--text-muted);">لە ١٠٠</span></h1>
        <button class="btn-main" onclick="location.reload()">دووبارە دەستپێکردنەوە</button>
    </div>
</div>

<script>
    const questions = [
        { q: "یەکەم پاشای دەوڵەتی ماد کێ بوو؟", os: ["دیاکۆ", "کەیخەسرهو", "ئەستیاگ", "حەمورابی"], a: 0 },
        { q: "ئەگەر درۆزنێک بڵێت 'من ئێستا درۆ دەکەم'، ئایا ڕاست دەکات یان درۆ؟", os: ["ڕاست دەکات", "درۆ دەکات", "پارادۆکسە (هەردوولا و هیچ کام نییە)", "مەحاڵە"], a: 2 },
        { q: "جەنگی جیهانی دووەم لە چ ساڵێکدا کۆتایی هات؟", os: ["1918", "1939", "1945", "1950"], a: 2 }
    ];

    let currentQ = 0;
    let score = 0;

    function startQuiz() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('q-num').innerText = currentQ + 1;
        document.getElementById('question-text').innerText = questions[currentQ].q;
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        
        questions[currentQ].os.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx, btn);
            optionsDiv.appendChild(btn);
        });
    }

    function checkAnswer(selected, selectedBtn) {
        const correctIndex = questions[currentQ].a;
        const optionsDiv = document.getElementById('options');
        const buttons = optionsDiv.getElementsByClassName('option-btn');
        
        // قفڵکردنی هەموو دوگمەکان
        for (let btn of buttons) {
            btn.disabled = true;
        }

        if (selected === correctIndex) {
            selectedBtn.classList.add('correct');
            score++;
            document.getElementById('score').innerText = score;
        } else {
            selectedBtn.classList.add('wrong');
            buttons[correctIndex].classList.add('correct'); // پیشاندانی وەڵامە ڕاستەکە بە سەوز
        }

        // پیشاندانی دوگمەی دوواتر
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
        currentQ++;
        if (currentQ >= questions.length) {
            showEnd();
        } else {
            showQuestion();
        }
    }

    function showEnd() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('end-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
    }
</script>

</body>
</html>
