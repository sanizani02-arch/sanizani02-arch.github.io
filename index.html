<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>کویزڵاند | ١٠٠ پرسیار</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #fff; --blue: #3b82f6; --green: #10b981; --red: #ef4444; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { background: var(--card); padding: 30px; border-radius: 16px; width: 100%; max-width: 600px; }
        .btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; cursor: pointer; background: #334155; color: white; text-align: right; font-size: 1rem; }
        .btn:hover { background: #475569; }
        .correct { background: var(--green) !important; }
        .incorrect { background: var(--red) !important; }
        .hide { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div id="menu">
            <h1>کویزڵاند</h1>
            <button class="btn" onclick="start('logic')">لۆژیک و مەتەڵ (٥٠ پرسیار)</button>
            <button class="btn" onclick="start('kurdish')">مێژووی کوردستان (٥٠ پرسیار)</button>
        </div>
        <div id="quiz" class="hide">
            <h2 id="q-text"></h2>
            <div id="a-btns"></div>
            <button id="next-btn" class="btn" style="background:var(--blue)" onclick="next()">پرسیاری داهاتوو</button>
        </div>
    </div>
    <script>
        const data = {
            logic: [
                {q: "هێلکەیەک لە ٣ خولەکدا بکوڵێت، بۆ ٥ هێلکە چەند پێویستە؟", a: [{t: "٣ خولەک", c: true}, {t: "١٥ خولەک", c: false}, {t: "٥ خولەک", c: false}]},
                {q: "شتێک هەیە هەمیشە دێت بەڵام قەت ناگات؟", a: [{t: "بەیانی", c: true}, {t: "دوێنێ", c: false}, {t: "تەمەن", c: false}]},
                // لێرە ٤٨ پرسیاری تری لۆژیک دابنێ...
            ],
            kurdish: [
                {q: "پایتەختی ئیمپراتۆریەتی میدیا کام شار بوو؟", a: [{t: "ئەحمەدان", c: true}, {t: "نەینەوا", c: false}, {t: "بابل", c: false}]},
                {q: "یەکەم ڕۆژنامەی کوردی لە چ شارێکدا دەرچوو؟", a: [{t: "قاهیرە", c: true}, {t: "ئەستەمبوڵ", c: false}, {t: "بەغداد", c: false}]},
                // لێرە ٤٨ پرسیاری تری مێژوو دابنێ...
            ]
        };
        let cat = '', idx = 0, score = 0;
        function start(c) { cat = c; idx = 0; document.getElementById('menu').classList.add('hide'); document.getElementById('quiz').classList.remove('hide'); show(); }
        function show() {
            let q = data[cat][idx];
            document.getElementById('q-text').innerText = q.q;
            let div = document.getElementById('a-btns'); div.innerHTML = '';
            [...q.a].sort(() => Math.random() - 0.5).forEach(ans => {
                let b = document.createElement('button'); b.className = 'btn'; b.innerText = ans.t;
                b.onclick = () => {
                    Array.from(div.children).forEach(btn => btn.disabled = true);
                    ans.c ? b.classList.add('correct') : b.classList.add('incorrect');
                    if(ans.c) score++;
                };
                div.appendChild(b);
            });
        }
        function next() { idx++; idx < data[cat].length ? show() : alert('ئەنجام: ' + score); }
    </script>
</body>
</html>
