<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جەنگی مێشک</title>
    <style>
        /* پاشبنەمایەکی ڕەشی تێکەڵ، قووڵ و نەرم کە سادە نییە */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #1a1c23 0%, #0d0e12 100%);
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* کارتی سەرەکی کویزەکە بە لێوارێکی زێڕینی درەوشاوە */
        .quiz-container {
            background: rgba(26, 28, 35, 0.85);
            border-radius: 24px;
            padding: 45px 35px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 15px rgba(212, 175, 55, 0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 1px solid #d4af37;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
        }

        h1 {
            color: #d4af37;
            font-size: 3rem;
            margin: 0 0 15px 0;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        /* دەقی بەخێرهاتن */
        .welcome-text {
            font-size: 1.35rem;
            margin: 0 0 40px 0;
            color: #a0aec0;
            font-weight: 600;
        }

        /* دوگمە سەرەکییە زێڕینە پڕەکان */
        .btn {
            background: linear-gradient(135deg, #d4af37 0%, #aa841c 100%);
            color: #0d0e12;
            border: none;
            padding: 18px 35px;
            font-size: 1.3rem;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            margin: 15px 0 0 0;
            font-weight: bold;
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.25);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.4);
            background: linear-gradient(135deg, #f3cd46 0%, #c49a24 100%);
        }

        /* دوگمەی بەشەکان بە ستایلی زێڕین */
        .category-btn {
            background: transparent;
            color: #d4af37;
            border: 2px solid #d4af37;
            padding: 16px;
            font-size: 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin: 12px 0;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .category-btn:hover {
            background: linear-gradient(135deg, #d4af37 0%, #aa841c 100%);
            color: #0d0e12;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        .options-container {
            margin: 30px 0;
        }

        /* دوگمەی وەڵامەکان لە ناو لاپەڕەی پرسیاردا */
        .option-btn {
            background-color: #2d3748;
            color: #e2e8f0;
            border: 1px solid #4a5568;
            padding: 16px 20px;
            width: 100%;
            margin: 12px 0;
            border-radius: 12px;
            cursor: pointer;
            text-align: right;
            font-size: 1.15rem;
            font-weight: 600;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        .option-btn:hover {
            border-color: #d4af37;
            background-color: rgba(212, 175, 55, 0.05);
            color: #d4af37;
            transform: translateX(-3px);
        }

        .hide {
            display: none;
        }

        /* دوگمەی دواتر */
        #next-btn {
            background: linear-gradient(135deg, #48bb78 0%, #2f855a 100%);
            color: #ffffff;
            box-shadow: 0 6px 20px rgba(56, 161, 105, 0.2);
        }

        #next-btn:hover {
            background: linear-gradient(135deg, #56cf87 0%, #38a169 100%);
            box-shadow: 0 10px 25px rgba(56, 161, 105, 0.35);
        }

        .score-text {
            font-size: 1.7rem;
            color: #d4af37;
            margin-bottom: 30px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <!-- لاپەڕەی سەرەکی و بەخێرهاتن -->
        <div id="start-page">
            <h1>جەنگی مێشک</h1>
            <p class="welcome-text">گرێکوێرەکانی لۆژیک و مێژوو</p>
            <button class="btn" onclick="showCategories()">دەستپێکردن</button>
        </div>

        <!-- لاپەڕەی هەڵبژاردنی بەشەکان -->
        <div id="category-page" class="hide">
            <h2 style="color: #d4af37; margin-bottom: 25px;">بەشێک هەڵبژێرە</h2>
            <button class="category-btn" onclick="startQuiz('logic')">گرێکوێرەکانی لۆژیک</button>
            <button class="category-btn" onclick="startQuiz('kurdish')">مێژووی کوردستان</button>
            <button class="category-btn" onclick="startQuiz('world')">مێژووی جیهان</button>
        </div>

        <!-- لاپەڕەی پرسیارەکان -->
        <div id="quiz-page" class="hide">
            <h2 id="question" style="color: #ffffff; margin-bottom: 30px; font-size: 1.5rem; line-height: 1.5;">پرسیار لێرەدا دەردەکەوێت</h2>
            <div id="options" class="options-container"></div>
            <button id="next-btn" class="btn hide" onclick="nextQuestion()">دواتر</button>
        </div>

        <!-- لاپەڕەی ئەنجام -->
        <div id="result-page" class="hide">
            <h2>کۆتایی جەنگ!</h2>
            <p class="score-text" id="score-display"></p>
            <button class="btn" onclick="restartQuiz()">دووبارە تاقیکردنەوە</button>
        </div>
    </div>

    <script>
        const quizData = {
            logic: [
                {
                    question: "کێشەیەکی لۆژیکی: سێ کلیل هەن و تەنها یەکێکیان دەرگاکە دەکاتەوە، ئەگەر یەکەم کلیل تاقی بکەیتەوە و نەبێت، چانسی کلیلەکەی تر چەندە؟",
                    answers: [
                        { text: "٥٠٪", correct: true },
                        { text: "٣٣.٣٪", correct: false },
                        { text: "١٠٠٪", correct: false },
                        { text: "٢٥٪", correct: false }
                    ]
                },
                {
                    question: "لۆژیک: شتێک هەیە هەمیشە دێت بەڵام قەت ناگات، ئەو شتە چییە؟",
                    answers: [
                        { text: "بەیانی (داهاتوو)", correct: true },
                        { text: "دوێنێ", correct: false },
                        { text: "سێبەر", correct: false },
                        { text: "تەمەن", correct: false }
                    ]
                }
            ],
            kurdish: [
                {
                    question: "مێژوو: ئیمپراتۆریەتی میدیا لە چ سەدەیەکدا دامەزرا؟",
                    answers: [
                        { text: "سەدەی حەوتمی پێش زایین", correct: true },
                        { text: "سەدەی پێنجەمی پێش زایین", correct: false },
                        { text: "سەدەی یەکەمی زایینی", correct: false },
                        { text: "سەدەی دەیەمی پێش زایین", correct: false }
                    ]
                },
                {
                    question: "مێژووی کوردستان: یەکەم ڕۆژنامەی کوردی (ڕۆژنامەی کوردستان) لە چ شارێکدا دەرچوو؟",
                    answers: [
                        { text: "قاهیرە", correct: true },
                        { text: "ئەستەمبوڵ", correct: false },
                        { text: "بەغداد", correct: false },
                        { text: "مەهاباد", correct: false }
                    ]
                }
            ],
            world: [
                {
                    question: "مێژووی جیهان: شۆڕشی فەڕەنسا لە چ ساڵێکدا بەرپا بوو؟",
                    answers: [
                        { text: "١٧٨٩", correct: true },
                        { text: "١٦٨٩", correct: false },
                        { text: "١٨٨٩", correct: false },
                        { text: "١٩٠٢", correct: false }
                    ]
                },
                {
                    question: "مێژووی جیهان: کام شارستانییەت یەکەم پیت و نووسینی (بزماری) داهێنا؟",
                    answers: [
                        { text: "سۆمەرییەکان", correct: true },
                        { text: "فیرعەونەکان", correct: false },
                        { text: "ڕۆمانییەکان", correct: false },
                        { text: "گریکییەکان", correct: false }
                    ]
                }
            ]
        };

        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;

        function showCategories() {
            document.getElementById('start-page').classList.add('hide');
            document.getElementById('category-page').classList.remove('hide');
        }

        function startQuiz(category) {
            document.getElementById('category-page').classList.add('hide');
            document.getElementById('quiz-page').classList.remove('hide');
            
            currentQuestions = quizData[category];
            currentQuestionIndex = 0;
            score = 0;
            showQuestion();
        }

        function showQuestion() {
            resetState();
            let currentQuestion = currentQuestions[currentQuestionIndex];
            document.getElementById('question').innerText = currentQuestion.question;

            currentQuestion.answers.forEach(answer => {
                const button = document.createElement('button');
                button.innerText = answer.text;
                button.classList.add('option-btn');
                if (answer.correct) {
                    button.dataset.correct = answer.correct;
                }
                button.addEventListener('click', selectAnswer);
                document.getElementById('options').appendChild(button);
            });
        }

        function resetState() {
            document.getElementById('next-btn').classList.add('hide');
            const optionsContainer = document.getElementById('options');
            while (optionsContainer.firstChild) {
                optionsContainer.removeChild(optionsContainer.firstChild);
            }
        }

        function selectAnswer(e) {
            const selectedBtn = e.target;
            const isCorrect = selectedBtn.dataset.correct === "true";
            if (isCorrect) {
                score++;
                selectedBtn.style.backgroundColor = "#2f855a";
                selectedBtn.style.borderColor = "#48bb78";
                selectedBtn.style.color = "#ffffff";
            } else {
                selectedBtn.style.backgroundColor = "#9b2c2c";
                selectedBtn.style.borderColor = "#e53e3e";
                selectedBtn.style.color = "#ffffff";
            }
            
            Array.from(document.getElementById('options').children).forEach(button => {
                button.disabled = true;
                if(button.dataset.correct === "true") {
                    button.style.backgroundColor = "#2f855a";
                    button.style.borderColor = "#48bb78";
                    button.style.color = "#ffffff";
                }
            });

            document.getElementById('next-btn').classList.remove('hide');
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < currentQuestions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-page').classList.add('hide');
            document.getElementById('result-page').classList.remove('hide');
            document.getElementById('score-display').innerText = `تۆ لە کۆی ${currentQuestions.length} پرسیار، ${score} وەڵامت ڕاست بوو!`;
        }

        function restartQuiz() {
            document.getElementById('result-page').classList.add('hide');
            document.getElementById('category-page').classList.remove('hide');
        }
    </script>
</body>
</html>
