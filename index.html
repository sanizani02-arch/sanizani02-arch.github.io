<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جەنگی مێشک</title>
    <style>
        /* ستایلی گشتی و پاشبنەمای ڕەشی شاهانە لەگەڵ نەخشەی کوردستان */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0c10;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" opacity="0.06" fill="%23ffffff"><path d="M420,180 Q460,150 510,130 T620,110 T710,150 T780,210 T830,290 T790,380 T680,440 T580,490 T490,520 T410,480 T350,420 T280,390 T210,350 T190,290 T260,230 T340,200 Z"/></svg>');
            background-position: center;
            background-repeat: no-repeat;
            background-size: contain;
            background-attachment: fixed;
            color: #c5c6c7;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            background-color: rgba(31, 40, 51, 0.9);
            border-radius: 15px;
            padding: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            max-width: 600px;
            width: 100%;
            text-align: center;
            border: 1px solid #45f3ff;
            backdrop-filter: blur(5px);
        }

        h1 {
            color: #45f3ff;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(69, 243, 255, 0.3);
        }

        /* بۆشایی و دەقی بەخێرهاتنی نوێ */
        .welcome-text {
            font-size: 1.2rem;
            margin-top: 5px;
            margin-bottom: 40px; /* جێهێشتنی بۆشایی نایاب */
            color: #9aa0a6;
            line-height: 1.6;
        }

        .btn {
            background-color: #1f2833;
            color: #45f3ff;
            border: 2px solid #45f3ff;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin: 10px 0;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #45f3ff;
            color: #0b0c10;
            box-shadow: 0 0 15px rgba(69, 243, 255, 0.5);
        }

        .options-container {
            margin: 30px 0;
        }

        .option-btn {
            background-color: #1f2833;
            color: #c5c6c7;
            border: 1px solid #c5c6c7;
            padding: 12px;
            width: 100%;
            margin: 8px 0;
            border-radius: 6px;
            cursor: pointer;
            text-align: right;
            font-size: 1.1rem;
            transition: 0.2s;
        }

        .option-btn:hover {
            border-color: #45f3ff;
            color: #45f3ff;
            background-color: rgba(69, 243, 255, 0.05);
        }

        .hide {
            display: none;
        }

        #next-btn {
            background-color: #66fcf1;
            color: #0b0c10;
            border: none;
        }

        #next-btn:hover {
            background-color: #45f3ff;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.6);
        }

        .score-text {
            font-size: 1.5rem;
            color: #66fcf1;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <!-- لاپەڕەی سەرەکی و بەخێرهاتن -->
        <div id="start-page">
            <h1>جەنگی مێشک</h1>
            <p class="welcome-text">گرێکوێرەکانی لۆژیک و مێژوو</p>
            <button class="btn" onclick="startQuiz()">دەستپێکردن</button>
        </div>

        <!-- لاپەڕەی پرسیارەکان -->
        <div id="quiz-page" class="hide">
            <h2 id="question" style="color: #ffffff; margin-bottom: 20px;">پرسیار لێرە دەردەکەوێت</h2>
            <div id="options" class="options-container"></div>
            <button id="next-btn" class="btn hide" onclick="nextQuestion()">دوواتر</button>
        </div>

        <!-- لاپەڕەی ئەنجام -->
        <div id="result-page" class="hide">
            <h2>کۆتایی جەنگ!</h2>
            <p class="score-text" id="score-display"></p>
            <button class="btn" onclick="restartQuiz()">دووبارە تاقیکردنەوە</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                question: "کێشەیەکی لۆژیکی: سێ کلیل هەن و تەنها یەکێکیان دەرگاکە دەکاتەوە، ئەگەر یەکەم کلیل تاقی بکەیتەوە و نەبێت، چانسی کلیلەکەی تر چەندە؟",
                answers: [
                    { text: "٥٠٪", correct: true },
                    { text: "٣٣.٣٪", correct: false },
                    { text: "١00٪", correct: false },
                    { text: "٢٥٪", correct: false }
                ]
            },
            {
                question: "مێژوو: ئیمپراتۆریەتی میدیا لە چ سەدەیەکدا دامەزرا؟",
                answers: [
                    { text: "سەدەی حەوتمی پێش زایین", correct: true },
                    { text: "سەدەی پێنجەمی پێش زایین", correct: false },
                    { text: "سەدەی یەکەمی زایینی", correct: false },
                    { text: "سەدەی دەیەمی پێش زایین", correct: false }
                ]
            },
            {
                question: "لۆژیک: شتێک هەیە هەمیشە دێت بەڵام قەت ناگات، ئەو شتە چییە؟",
                answers: [
                    { text: "بەیانی (داهاتوو)", correct: true },
                    { text: "دوێنێ", correct: false },
                    { text: "سێبەر", correct: false },
                    { text: "تەمەن", correct: false }
                ]
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;

        function startQuiz() {
            document.getElementById('start-page').classList.add('hide');
            document.getElementById('quiz-page').classList.remove('hide');
            currentQuestionIndex = 0;
            score = 0;
            showQuestion();
        }

        function showQuestion() {
            resetState();
            let currentQuestion = questions[currentQuestionIndex];
            document.getElementById('question').innerText = currentQuestion.question;

            currentQuestion.answers.forEach(answer => {
                const button = document.createElement('button');
                button.innerText = answer.text;
                button.classList.add('option-btn');
                if (answer.correct) {
                    button.dataset.correct = answer.correct;
                }
                button.addEventListener('click', selectAnswer);
                document.getElementById('options').appendChild(button);
            });
        }

        function resetState() {
            document.getElementById('next-btn').classList.add('hide');
            const optionsContainer = document.getElementById('options');
            while (optionsContainer.firstChild) {
                optionsContainer.removeChild(optionsContainer.firstChild);
            }
        }

        function selectAnswer(e) {
            const selectedBtn = e.target;
            const isCorrect = selectedBtn.dataset.correct === "true";
            if (isCorrect) {
                score++;
                selectedBtn.style.backgroundColor = "#2e7d32";
                selectedBtn.style.color = "#ffffff";
            } else {
                selectedBtn.style.backgroundColor = "#c62828";
                selectedBtn.style.color = "#ffffff";
            }
            
            Array.from(document.getElementById('options').children).forEach(button => {
                button.disabled = true;
                if(button.dataset.correct === "true") {
                    button.style.backgroundColor = "#2e7d32";
                    button.style.color = "#ffffff";
                }
            });

            document.getElementById('next-btn').classList.remove('hide');
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-page').classList.add('hide');
            document.getElementById('result-page').classList.remove('hide');
            document.getElementById('score-display').innerText = `تۆ لە کۆی ${questions.length} پرسیار، ${score} وەڵامت ڕاست بوو!`;
        }

        function restartQuiz() {
            document.getElementById('result-page').classList.add('hide');
            document.getElementById('start-page').classList.remove('hide');
        }
    </script>
</body>
</html>
